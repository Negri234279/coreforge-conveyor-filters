name: Docker publish

on:
    push:
        branches: [main, master]

# A new push supersedes any in-flight build for the same ref.
concurrency:
    group: docker-publish-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

env:
    IMAGE: negrii/coreforge-conveyor-filters

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Read version from package.json
              id: pkg
              run: |
                  VERSION=$(node -p "require('./package.json').version")
                  echo "version=$VERSION" >> "$GITHUB_OUTPUT"
                  echo "Publishing version $VERSION"

            - name: Set up QEMU (multi-arch)
              uses: docker/setup-qemu-action@v3

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Compute image tags + labels
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.IMAGE }}
                  tags: |
                      type=raw,value=latest
                      type=raw,value=${{ steps.pkg.outputs.version }}
                  labels: |
                      org.opencontainers.image.title=CoreForge — Conveyor Filters
                      org.opencontainers.image.version=${{ steps.pkg.outputs.version }}
                      org.opencontainers.image.revision=${{ github.sha }}
                      org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

            - name: Build and push
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: ./Dockerfile
                  platforms: linux/amd64,linux/arm64
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  provenance: false
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
