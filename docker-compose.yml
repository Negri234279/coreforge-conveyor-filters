# Production stack for CoreForge.
#
# Just the app: Astro SSR on Node 24, pulled from Docker Hub. It does its own
# session auth, CSRF (Origin checks) and security headers, so there's no
# reverse-proxy sidecar. Put it behind your existing TLS-terminating proxy
# (e.g. Nginx Proxy Manager) and point a proxy host at  http://<host>:8080.

services:
    app:
        image: negrii/coreforge-conveyor-filters:latest
        container_name: coreforge-app
        restart: unless-stopped

        # Host port 8080 -> the app's 4321, so it coexists with a proxy that
        # owns 80/443. If the proxy runs on this same host, prefer loopback:
        #   - '127.0.0.1:8080:4321'
        ports:
            - '8080:4321'

        environment:
            NODE_ENV: production
            HOST: 0.0.0.0
            PORT: '4321'
            DATA_DIR: /data

        volumes:
            - coreforge-data:/data

        # --- Hardening ---------------------------------------------------
        user: 'node'
        init: true # PID-1 signal forwarding + zombie reaping
        security_opt:
            - no-new-privileges:true
        cap_drop:
            - ALL
        # Root FS is immutable; the only persistent writable path is /data.
        # tmpfs covers ephemeral scratch: /tmp and Astro's session cache dir
        # (only touched if a request uses Astro.session, but harmless empty).
        read_only: true
        tmpfs:
            - /tmp:size=64m
            - /app/.astro:uid=1000,gid=1000,size=16m

        deploy:
            resources:
                limits:
                    cpus: '1.0'
                    memory: 512M

        healthcheck:
            test:
                - CMD
                - node
                - -e
                - "fetch('http://127.0.0.1:'+process.env.PORT+'/login').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
            interval: 30s
            timeout: 5s
            start_period: 20s
            retries: 3

        logging:
            driver: json-file
            options:
                max-size: '10m'
                max-file: '3'

volumes:
    coreforge-data:
