# Production stack for CoreForge.
#
# Just the app: Astro SSR on Node 24, pulled from Docker Hub. It does its own
# session auth, CSRF (Origin checks) and security headers, so there's no
# reverse-proxy sidecar. Put it behind your existing TLS-terminating proxy
# (e.g. Nginx Proxy Manager) and point a proxy host at  http://<host>:8080.

services:
    app:
        image: negrii/coreforge-conveyor-filters:latest
        container_name: coreforge-app
        restart: unless-stopped

        # Host port 8080 -> the app's 4321, so it coexists with a proxy that
        # owns 80/443. If the proxy runs on this same host, prefer loopback:
        #   - '127.0.0.1:8080:4321'
        ports:
            - '8080:4321'

        environment:
            NODE_ENV: production
            HOST: 0.0.0.0
            PORT: '4321'
            DATA_DIR: /data

            # --- OpenTelemetry → SigNoz ----------------------------------
            # The SigNoz collector lives in the shared `observability` docker
            # network (brought up by infra/prod/docker-compose.yml). gRPC
            # over the internal hostname is the fastest path and never leaves
            # the host. If SigNoz is on another host, point this at the
            # public OTLP endpoint (https://otlp.<app>.<domain>) and remove
            # the network alias below.
            OTEL_EXPORTER_OTLP_ENDPOINT: http://signoz-otel-collector:4317
            OTEL_EXPORTER_OTLP_PROTOCOL: grpc
            OTEL_SERVICE_NAME: coreforge
            OTEL_RESOURCE_ATTRIBUTES: 'service.namespace=coreforge,deployment.environment=production'
            # Surfaces the app's version (read from package.json + git SHA at
            # build) as service.version so SigNoz can split metrics by release.
            OTEL_LOG_LEVEL: error

            # Trace sampling: keep 10% of browser-initiated traces (which are
            # the user-facing requests). `parentbased_traceidratio` respects
            # upstream sampling decisions, so a trace sampled by the browser
            # SDK is fully recorded on the backend too — no orphan spans.
            # Errors are NOT exempted from sampling here (the SDK doesn't
            # support tail-based out of the box); if missed errors become a
            # problem, raise the ratio or move sampling to the collector.
            OTEL_TRACES_SAMPLER: parentbased_traceidratio
            OTEL_TRACES_SAMPLER_ARG: '0.1'

            # Browser RUM endpoint. The frontend SDK POSTs OTLP/HTTP to
            # <url>/v1/traces and /v1/logs. Must terminate TLS — point NPM at
            # the collector's host:4318. Unset to disable RUM.
            OTEL_RUM_EXPORTER_URL: https://otlp.coreforge-conveyor-filters.negri.es
            OTEL_RUM_SERVICE_NAME: coreforge-web

            # Admin shortcut: render a "SigNoz" button on /admin that opens
            # the observability UI in a new tab. Unset to hide the button.
            SIGNOZ_URL: https://signoz.negri.es

        volumes:
            - coreforge-data:/data

        # Joins the SigNoz stack network so the OTel SDK can resolve
        # `signoz-otel-collector`. The network is created/owned by
        # infra/prod/docker-compose.yml (`docker network create
        # --driver bridge observability` if you bring CoreForge up first).
        networks:
            - default
            - observability

        # --- Hardening ---------------------------------------------------
        user: 'node'
        init: true # PID-1 signal forwarding + zombie reaping
        security_opt:
            - no-new-privileges:true
        cap_drop:
            - ALL
        # Root FS is immutable; the only persistent writable path is /data.
        # tmpfs covers ephemeral scratch: /tmp and Astro's session cache dir
        # (only touched if a request uses Astro.session, but harmless empty).
        read_only: true
        tmpfs:
            - /tmp:size=64m
            - /app/.astro:uid=1000,gid=1000,size=16m

        deploy:
            resources:
                limits:
                    cpus: '1.0'
                    memory: 512M

        healthcheck:
            test:
                - CMD
                - node
                - -e
                - "fetch('http://127.0.0.1:'+process.env.PORT+'/api/healthz').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"
            interval: 30s
            timeout: 5s
            start_period: 20s
            retries: 3

        logging:
            driver: json-file
            options:
                max-size: '10m'
                max-file: '3'

volumes:
    coreforge-data:

networks:
    observability:
        name: observability
        external: true
