services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        image: coreforge:latest
        container_name: coreforge-app
        restart: unless-stopped

        # No port published to host. Only reachable from the nginx sidecar over
        # the internal compose network.
        expose:
            - '4321'

        environment:
            NODE_ENV: production
            HOST: 0.0.0.0
            PORT: '4321'
            DATA_DIR: /data

        volumes:
            - coreforge-data:/data

        security_opt:
            - no-new-privileges:true
        cap_drop:
            - ALL
        user: 'node'

        deploy:
            resources:
                limits:
                    cpus: '1.0'
                    memory: 512M

        healthcheck:
            test:
                - CMD
                - node
                - -e
                - "fetch('http://127.0.0.1:'+process.env.PORT+'/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
            interval: 30s
            timeout: 5s
            start_period: 20s
            retries: 3

        logging:
            driver: json-file
            options:
                max-size: '10m'
                max-file: '3'

    nginx:
        image: nginx:1.27-alpine
        container_name: coreforge-nginx
        restart: unless-stopped
        depends_on:
            app:
                condition: service_healthy

        # Custom host port — NPM already owns 80/443 on the host.
        # Override with COREFORGE_PORT in .env or shell env.
        ports:
            - '${COREFORGE_PORT:-8080}:80'

        volumes:
            - ./nginx/conf.d:/etc/nginx/conf.d:ro
            - ./secrets/htpasswd:/etc/nginx/.htpasswd:ro

        security_opt:
            - no-new-privileges:true

        healthcheck:
            test: ['CMD-SHELL', 'wget -q -O - http://127.0.0.1/healthz | grep -q ok']
            interval: 30s
            timeout: 5s
            start_period: 10s
            retries: 3

        logging:
            driver: json-file
            options:
                max-size: '10m'
                max-file: '3'

volumes:
    coreforge-data:
