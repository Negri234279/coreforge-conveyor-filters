upstream coreforge_app {
    server app:4321;
    keepalive 16;
}

server {
    listen 80 default_server;
    server_name _;

    # Hide nginx version in headers / error pages.
    server_tokens off;

    # NPM (or any other reverse proxy) sits in front of this nginx.
    # Trust X-Forwarded-* headers from it so logs show the real client IP.
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    client_max_body_size 2m;

    # Healthcheck endpoint: bypasses basic auth so the container's
    # HEALTHCHECK can probe nginx without credentials.
    location = /healthz {
        access_log off;
        auth_basic off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # Everything else is gated by HTTP basic auth.
    auth_basic           "CoreForge";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location / {
        proxy_pass http://coreforge_app;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        proxy_connect_timeout 5s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}
